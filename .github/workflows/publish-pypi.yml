name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: maestro-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # ---- Linux ----
          CIBW_BEFORE_ALL_LINUX: >-
            curl -L https://archives.boost.io/release/1.89.0/source/boost_1_89_0.tar.gz -o /tmp/boost.tgz &&
            tar -xzf /tmp/boost.tgz -C /tmp &&
            cd /tmp/boost_1_89_0 &&
            ./bootstrap.sh --prefix=/usr/local &&
            ./b2 -j$(nproc) --with-program_options --with-json --with-container --with-serialization install

          # ---- macOS ----
          CIBW_BEFORE_ALL_MACOS: >-
            brew install boost openblas libomp

          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=14.0
            CMAKE_ARGS="-DOpenMP_ROOT=$(brew --prefix libomp)"
            DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix)/lib:$(brew --prefix openblas)/lib:$(brew --prefix libomp)/lib

          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix)/lib:$(brew --prefix openblas)/lib:$(brew --prefix libomp)/lib
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

          CIBW_ARCHS_MACOS: auto

          # ---- Common ----
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_* *i686 *ppc64le *s390x"

      - uses: actions/upload-artifact@v4
        with:
          name: maestro-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  upload_pypi:
    name: Upload to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/qoro-maestro
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: maestro-*
          path: dist
          merge-multiple: true

      - name: Publish package distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
