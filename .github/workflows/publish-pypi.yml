name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # Run CI tests first — must pass before any publishing happens
  ci:
    name: Run CI tests
    uses: ./.github/workflows/cmake-multi-platform.yml

  build_sdist:
    name: Build source distribution
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: maestro-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.cibw_build }})
    needs: [ci]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw_build: "cp310-* cp311-* cp312-*"
          - os: macos-14
            cibw_build: "cp310-* cp311-* cp312-*"
          - os: windows-latest
            cibw_build: "cp310-*"
          - os: windows-latest
            cibw_build: "cp311-*"
          - os: windows-latest
            cibw_build: "cp312-*"

    steps:
      - uses: actions/checkout@v4

      - name: Cache cibuildwheel virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/cibuildwheel
            ~/.cache/cibuildwheel
            ~\AppData\Local\pypa\cibuildwheel\Cache
          key: cibw-virtualenv-20.27.1

      - name: Pre-download virtualenv (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            CACHE_DIR=~/Library/Caches/cibuildwheel
          else
            CACHE_DIR=~/.cache/cibuildwheel
          fi
          mkdir -p "$CACHE_DIR"
          if [ ! -f "$CACHE_DIR/virtualenv-20.27.1.pyz" ]; then
            curl -L --retry 5 --retry-delay 10 --retry-all-errors \
              -o "$CACHE_DIR/virtualenv-20.27.1.pyz" \
              "https://github.com/pypa/get-virtualenv/blob/20.27.1/public/virtualenv.pyz?raw=true"
          fi

      - name: Pre-download virtualenv (Windows)
        if: runner.os == 'Windows'
        run: |
          $CacheDir = "$env:USERPROFILE\AppData\Local\pypa\cibuildwheel\Cache"
          New-Item -ItemType Directory -Force -Path $CacheDir | Out-Null
          $VenvPath = "$CacheDir\virtualenv-20.27.1.pyz"
          if (-not (Test-Path $VenvPath)) {
            $headers = @{ Authorization = "token $env:GITHUB_TOKEN" }
            $retries = 5
            for ($i = 0; $i -lt $retries; $i++) {
              try {
                Invoke-WebRequest -Uri "https://github.com/pypa/get-virtualenv/blob/20.27.1/public/virtualenv.pyz?raw=true" -Headers $headers -OutFile $VenvPath
                break
              } catch {
                if ($i -lt $retries - 1) { Start-Sleep -Seconds 10 }
                else { throw }
              }
            }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/binary-cache
          key: vcpkg-windows-x64-deps1
          restore-keys: |
            vcpkg-windows-x64-

      - name: Unset VCPKG env (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "VCPKG_ROOT=" >> $env:GITHUB_ENV
          echo "VCPKG_INSTALLATION_ROOT=" >> $env:GITHUB_ENV
        # Suppresses "ignoring mismatched VCPKG_ROOT" when runner has VS vcpkg path set

      - name: Configure git auth for vcpkg (Windows)
        if: runner.os == 'Windows' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          git config --global credential.https://github.com.helper '!f() { echo "username=x-access-token"; echo "password=$GITHUB_TOKEN"; }; f'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          Remove-Item Env:VCPKG_ROOT -ErrorAction SilentlyContinue
          Remove-Item Env:VCPKG_INSTALLATION_ROOT -ErrorAction SilentlyContinue
          vcpkg install boost-json:x64-windows boost-program-options:x64-windows boost-container:x64-windows boost-serialization:x64-windows openblas:x64-windows
          echo "CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
        env:
          VCPKG_BINARY_SOURCES: "clear;files,C:/vcpkg/binary-cache,readwrite"

      - name: Set CMake env (Windows, cache hit)
        if: runner.os == 'Windows' && steps.cache-vcpkg.outputs.cache-hit == 'true'
        run: |
          if (-not (Test-Path "C:\vcpkg\scripts\buildsystems\vcpkg.cmake")) {
            Write-Error "Cache hit but vcpkg toolchain not found at C:\vcpkg. Ensure vcpkg is at C:\vcpkg on this runner."
          }
          echo "CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # ---- Linux ----
          CIBW_BEFORE_ALL_LINUX: >-
            curl -L https://archives.boost.io/release/1.89.0/source/boost_1_89_0.tar.gz -o /tmp/boost.tgz &&
            tar -xzf /tmp/boost.tgz -C /tmp &&
            cd /tmp/boost_1_89_0 &&
            ./bootstrap.sh --prefix=/usr/local &&
            ./b2 -j$(nproc) --with-program_options --with-json --with-container --with-serialization install

          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            auditwheel repair -w {dest_dir} {wheel} &&
            pip install wheel patchelf &&
            for whl in {dest_dir}/*.whl; do
              wheel unpack -d /tmp/whl_fix "$whl" &&
              patchelf --add-rpath '$ORIGIN' /tmp/whl_fix/*/maestro.cpython-*.so &&
              rm "$whl" &&
              wheel pack -d {dest_dir} /tmp/whl_fix/* &&
              rm -rf /tmp/whl_fix;
            done

          # ---- macOS ----
          CIBW_BEFORE_ALL_MACOS: >-
            brew install boost openblas libomp

          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=14.0
            CMAKE_ARGS="-DOpenMP_ROOT=$(brew --prefix libomp)"
            DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix)/lib:$(brew --prefix openblas)/lib:$(brew --prefix libomp)/lib

          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix)/lib:$(brew --prefix openblas)/lib:$(brew --prefix libomp)/lib
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

          CIBW_ARCHS_MACOS: auto

          # ---- Windows ----
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ENVIRONMENT_WINDOWS: "CMAKE_BUILD_PARALLEL_LEVEL=8"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >-
            pip install delvewheel &&
            delvewheel repair -w {dest_dir} --add-path "C:\vcpkg\installed\x64-windows\bin;build\cp310-cp310-win_amd64\bin;build\cp311-cp311-win_amd64\bin;build\cp312-cp312-win_amd64\bin" {wheel}

          # ---- Common ----
          CIBW_BUILD: "${{ matrix.cibw_build }}"
          CIBW_SKIP: "*-musllinux_* *i686 *ppc64le *s390x"

      - name: Save vcpkg cache (Windows, even on failure)
        if: runner.os == 'Windows' && always() && steps.cache-vcpkg.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/binary-cache
          key: vcpkg-windows-x64-deps1

      - uses: actions/upload-artifact@v4
        with:
          name: maestro-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  upload_pypi:
    name: Upload to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/qoro-maestro
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: maestro-*
          path: dist
          merge-multiple: true

      - name: Publish package distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
