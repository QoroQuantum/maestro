name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: maestro-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Install Boost, OpenBLAS, and libomp on macOS
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install boost openblas libomp
          echo "PKG_CONFIG_PATH=$(brew --prefix openblas)/lib/pkgconfig" >> $GITHUB_ENV
          echo "CMAKE_ARGS=-DOpenMP_ROOT=$(brew --prefix libomp)" >> $GITHUB_ENV
          # Set the fallback library path so delocate-wheel can find the dylibs during repair
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix)/lib:$(brew --prefix openblas)/lib:$(brew --prefix libomp)/lib" >> $GITHUB_ENV

      # Install Boost and OpenBLAS on Windows via vcpkg
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install boost-json:x64-windows boost-program-options:x64-windows boost-container:x64-windows boost-serialization:x64-windows openblas:x64-windows
          echo "CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BEFORE_ALL_LINUX: "curl -L https://archives.boost.io/release/1.89.0/source/boost_1_89_0.tar.gz -o boost.tgz && tar -xzf boost.tgz && cd boost_1_89_0 && ./bootstrap.sh && ./b2 -j4 --with-program_options --with-json --with-container --with-serialization install"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_* *i686 *ppc64le *s390x"

      - uses: actions/upload-artifact@v4
        with:
          name: maestro-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  upload_pypi:
    name: Upload to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/qoro-maestro
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: maestro-*
          path: dist
          merge-multiple: true

      - name: Publish package distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
